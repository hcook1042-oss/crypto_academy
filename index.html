<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Academy</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<form action="register.php" method="POST">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#0b0f1a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#111827;
    padding:40px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(255,193,7,.3);
}

h1{
    text-align:center;
    color:#f5c542;
    margin-bottom:10px;
}

p{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
}

.input-box{
    margin-bottom:20px;
}

.input-box label{
    color:white;
    display:block;
    margin-bottom:8px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#1f2937;
    color:white;
    font-size:16px;
}

.input-box input:focus{
    outline:none;
    border:2px solid #f5c542;
}

button{
    width:100%;
    padding:15px;
    background:#f5c542;
    color:#111;
    border:none;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#ffb700;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#aaa;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">

<h1>Crypto Academy</h1>

<p>Registration</p>

<form>

<div class="input-box">
<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>
</div>

<div class="input-box">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="input-box">
<label>Password</label>
<input type="password" placeholder="Enter your password" required>
</div>

<button type="submit">Submit</button>

<div class="footer">
© 2026 Crypto Academy
</div>

</div>

</button>

</form>

</body>

</html>
